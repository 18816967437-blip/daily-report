<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>电驱车间生产日报</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:#0f1117;color:#e4e4e7;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:60px 20px}
h1{font-size:28px;font-weight:700;background:linear-gradient(135deg,#3b82f6,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.sub{color:#8b8fa3;font-size:14px;margin-bottom:32px}
table{width:100%;max-width:600px;border-collapse:collapse;background:#1a1d27;border:1px solid #2a2d3a;border-radius:12px;overflow:hidden}
th{background:#1e2130;color:#8b8fa3;font-size:12px;font-weight:500;padding:12px 16px;text-align:left}
td{padding:14px 16px;border-bottom:1px solid #2a2d3a}
tr:last-child td{border-bottom:none}
tr:hover{background:rgba(59,130,246,.06)}
a{color:#3b82f6;text-decoration:none;font-weight:600;padding:6px 16px;border:1px solid #3b82f6;border-radius:6px;font-size:13px;transition:all .2s}
a:hover{background:#3b82f6;color:#fff}
</style>
</head>
<body>
<h1>电驱车间生产日报</h1>
<p class="sub">历史日报索引</p>
<table>
<thead><tr><th>日期</th><th style="text-align:right">操作</th></tr></thead>
<tbody id="list"></tbody>
</table>
<script>
const files=['2026-05-08'];
document.getElementById('list').innerHTML=
  files.map(f=>`<tr><td>${f}</td><td style="text-align:right"><a href="${f}.html">打开日报</a></td></tr>`).join('');
document.querySelector('.sub').textContent='共 '+files.length+' 份日报';
</script>
</body>
</html>
